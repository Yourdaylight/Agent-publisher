name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  # ── Layer 1: Lint ───────────────────────────────────────────────────────
  lint:
    name: ruff + type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Sync Python dependencies
        run: uv sync --extra dev

      - name: Run ruff check
        run: uv run ruff check .

      - name: Run ruff format check
        run: uv run ruff format --check .

  # ── Layer 2: Unit + Integration tests (fast, no browser) ────────────────
  pytest:
    name: pytest (unit + integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Sync Python dependencies
        run: uv sync --extra dev

      - name: Run unit + integration tests
        run: |
          uv run pytest tests/ \
            --ignore=tests/test_image_service.py \
            --ignore=tests/test_wechat_service.py \
            -v --tb=short
        env:
          AP_ACCESS_KEY: agent-publisher-2024

  # ── Layer 3: Frontend build + type check ────────────────────────────────
  frontend-build:
    name: frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install and build
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Upload static bundle
        uses: actions/upload-artifact@v4
        with:
          name: static-bundle
          path: agent_publisher/static/
          retention-days: 1

  # ── Layer 4: E2E smoke tests (Playwright, production bundle) ────────────
  e2e:
    name: e2e smoke (playwright)
    runs-on: ubuntu-latest
    needs: [pytest, frontend-build]
    if: success()
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Sync Python dependencies
        run: uv sync --extra dev

      - name: Download built frontend bundle
        uses: actions/download-artifact@v4
        with:
          name: static-bundle
          path: agent_publisher/static/

      - name: Install Playwright + Chromium
        working-directory: web
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright E2E (against production bundle on port 9099)
        working-directory: web
        run: npm run test:e2e
        env:
          AP_ACCESS_KEY: agent-publisher-2024

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

  # ── Layer 5: CLI smoke test (curl-based) ────────────────────────────────
  smoke:
    name: curl smoke
    runs-on: ubuntu-latest
    needs: [pytest, frontend-build]
    if: success()
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Sync Python dependencies
        run: uv sync --extra dev

      - name: Download built frontend bundle
        uses: actions/download-artifact@v4
        with:
          name: static-bundle
          path: agent_publisher/static/

      - name: Start backend (production bundle)
        run: |
          uv run uvicorn agent_publisher.main:app --host 0.0.0.0 --port 9099 &
          echo "Waiting for server..."
          for i in $(seq 1 20); do
            curl -sf http://localhost:9099/api/version >/dev/null 2>&1 && break
            sleep 1
          done
          curl -sf http://localhost:9099/api/version || (echo "Server failed to start"; exit 1)
        env:
          AP_ACCESS_KEY: agent-publisher-2024

      - name: Run smoke.sh
        run: bash smoke.sh --port 9099 --access-key agent-publisher-2024
